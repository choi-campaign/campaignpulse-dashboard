name: Apply collection status integration

on:
  push:
    paths:
      - .github/patches/collection-status.zip.b64
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and apply verified patch
        shell: bash
        run: |
          base64 --decode .github/patches/collection-status.zip.b64 > /tmp/collection-status.zip
          unzip -p /tmp/collection-status.zip > /tmp/collection-status.patch
          git apply --check /tmp/collection-status.patch
          git apply /tmp/collection-status.patch

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile
        run: python -m compileall aimaos tests

      - name: Test
        run: python -m pytest tests -q

      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "CampaignPulse CI"
          git config user.email "actions@users.noreply.github.com"
          git add aimaos/app/streamlit_app.py aimaos/storage/collection_log.py tests/test_marketplace_collection.py docs/COLLECTION_LOG_SCHEMA.md docs/DATA_STATUS_CENTER_REFACTOR.md
          git commit -m "Connect collection logs to data status"
          git push origin HEAD:main
