name: Apply public data privacy scrub

on:
  push:
    paths:
      - .github/patches/privacy-scrub.zip.b64
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and apply patch
        shell: bash
        run: |
          base64 --decode .github/patches/privacy-scrub.zip.b64 > /tmp/privacy-scrub.zip
          unzip -p /tmp/privacy-scrub.zip > /tmp/privacy-scrub.patch
          git apply --check /tmp/privacy-scrub.patch
          git apply /tmp/privacy-scrub.patch
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall aimaos tests
      - run: python -m pytest tests -q
      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "CampaignPulse CI"
          git config user.email "actions@users.noreply.github.com"
          git add aimaos/validators/raw_media_audit.py tests/test_demo_deploy_readiness.py docs/GMARKET_AUCTION_PRIORITY_VALIDATION.md docs/RAW_MEDIA_FILE_VALIDATION_SUMMARY.md docs/RULE_ENGINE_V2_ACTUAL_DATA_VALIDATION.md docs/GMARKET_AUCTION_REPORT_LEARNING_NOTE.md
          git commit -m "Scrub public advertiser references"
          git push origin HEAD:main
