name: Add marketplace file guard test

on:
  push:
    paths:
      - .github/patches/marketplace-file-guard.trigger

permissions:
  contents: write

jobs:
  update-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Add regression cases
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_marketplace_collection.py")
          text = path.read_text(encoding="utf-8")
          replacements = [
              (
                  '    xlsx_path = tmp_path / "report.xlsx"\n',
                  '    xlsx_path = tmp_path / "report.xlsx"\n'
                  '    uppercase_path = tmp_path / "REPORT.XLSX"\n'
                  '    empty_path = tmp_path / "empty.xlsx"\n',
              ),
              (
                  '    xlsx_path.write_bytes(b"safe-test-placeholder")\n',
                  '    xlsx_path.write_bytes(b"safe-test-placeholder")\n'
                  '    uppercase_path.write_bytes(b"safe-uppercase-placeholder")\n'
                  '    empty_path.write_bytes(b"")\n',
              ),
              (
                  '    set_modified_at(xlsx_path, now)\n',
                  '    set_modified_at(xlsx_path, now)\n'
                  '    set_modified_at(uppercase_path, now)\n'
                  '    set_modified_at(empty_path, now)\n',
              ),
              (
                  '    assert xlsx_path in detected\n',
                  '    assert xlsx_path in detected\n'
                  '    assert uppercase_path in detected\n'
                  '    assert empty_path not in detected\n',
              ),
          ]
          if "uppercase_path = tmp_path" not in text:
              for old, new in replacements:
                  if old not in text:
                      raise SystemExit(f"expected line not found: {old!r}")
                  text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall aimaos tests
      - run: python -m pytest tests -q
      - name: Commit verified test
        shell: bash
        run: |
          git config user.name "CampaignPulse CI"
          git config user.email "actions@users.noreply.github.com"
          git add tests/test_marketplace_collection.py
          git commit -m "Test marketplace completed file guards"
          git push origin HEAD:main
