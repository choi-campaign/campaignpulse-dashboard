name: Apply Naver HTTP retry tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/patches/naver-http-retry-tests.trigger
      - .github/workflows/apply-naver-http-retry-tests.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply safe test hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path('tests/test_naver_searchad_poc.py')
          text = test_path.read_text(encoding='utf-8')
          text = text.replace(
              'from datetime import date\nimport csv\nimport json\nfrom urllib.error import URLError\n',
              'from datetime import date\nimport csv\nfrom io import BytesIO\nimport json\nfrom urllib.error import HTTPError, URLError\n',
          )
          if 'test_naver_client_retries_retryable_http_error' not in text:
              new_tests = '\n'.join([
                  'def test_naver_client_retries_retryable_http_error(monkeypatch, tmp_path):',
                  '    calls = []',
                  '    sleeps = []',
                  '',
                  '    def fake_urlopen(_request, timeout):',
                  '        calls.append(timeout)',
                  '        if len(calls) == 1:',
                  '            raise HTTPError(',
                  '                url="https://api.searchad.naver.com/stats",',
                  '                code=429,',
                  '                msg="Too Many Requests",',
                  '                hdrs=None,',
                  '                fp=BytesIO(b\'{"code":429}\'),',
                  '            )',
                  '        return FakeResponse()',
                  '',
                  '    monkeypatch.setattr(naver_searchad_poc, "urlopen", fake_urlopen)',
                  '    monkeypatch.setattr(naver_searchad_poc.time, "sleep", sleeps.append)',
                  '    client = NaverSearchAdPocClient(',
                  '        credentials(),',
                  '        tmp_path / "evidence",',
                  '        max_attempts=2,',
                  '        retry_delay_seconds=0.2,',
                  '    )',
                  '',
                  '    ok, payload, status = client.request_json("GET", "/stats")',
                  '',
                  '    assert ok is True',
                  '    assert payload["data"][0]["id"] == "cmp-1"',
                  '    assert status == "HTTP 200"',
                  '    assert len(calls) == 2',
                  '    assert sleeps == [0.2]',
                  '',
                  '',
                  'def test_naver_client_does_not_retry_non_retryable_http_error(monkeypatch, tmp_path):',
                  '    calls = []',
                  '    sleeps = []',
                  '',
                  '    def fake_urlopen(_request, timeout):',
                  '        calls.append(timeout)',
                  '        raise HTTPError(',
                  '            url="https://api.searchad.naver.com/stats",',
                  '            code=401,',
                  '            msg="Unauthorized",',
                  '            hdrs=None,',
                  '            fp=BytesIO(b\'{"error":"unauthorized"}\'),',
                  '        )',
                  '',
                  '    monkeypatch.setattr(naver_searchad_poc, "urlopen", fake_urlopen)',
                  '    monkeypatch.setattr(naver_searchad_poc.time, "sleep", sleeps.append)',
                  '    client = NaverSearchAdPocClient(',
                  '        credentials(),',
                  '        tmp_path / "evidence",',
                  '        max_attempts=3,',
                  '        retry_delay_seconds=0.1,',
                  '    )',
                  '',
                  '    ok, payload, status = client.request_json("GET", "/stats")',
                  '',
                  '    assert ok is False',
                  '    assert status == "HTTP 401"',
                  '    assert payload["status"] == 401',
                  '    assert payload["attempts"] == 1',
                  '    assert len(calls) == 1',
                  '    assert sleeps == []',
                  '',
                  '',
              ])
              marker = '    assert sleeps == [0.1]\n\n\ndef test_naver_collection_log_records_no_data_without_raw_customer_id'
              text = text.replace(
                  marker,
                  '    assert sleeps == [0.1]\n\n\n' + new_tests + 'def test_naver_collection_log_records_no_data_without_raw_customer_id',
              )
          test_path.write_text(text, encoding='utf-8')

          doc_path = Path('docs/CONTINUOUS_HARDENING_STATUS_20260619.md')
          doc = doc_path.read_text(encoding='utf-8')
          doc = doc.replace('기록일: 2026-06-20', '기록일: 2026-07-22')
          detail = '  - 네이버 API HTTP 429 계열 재시도와 401 인증 오류 비재시도 동작을 회귀 테스트로 고정한다.\n'
          if detail not in doc:
              doc = doc.replace('- `tests/test_naver_searchad_poc.py`\n', '- `tests/test_naver_searchad_poc.py`\n' + detail)
          doc = doc.replace('- pytest: `32 passed`', '- pytest: `360 passed`')
          verification = '- 네이버 HTTP 재시도/비재시도 회귀 테스트: 성공\n'
          if verification not in doc:
              doc = doc.replace('- 네이버 날짜 범위 및 빈 데이터 로그 테스트: 성공\n', '- 네이버 날짜 범위 및 빈 데이터 로그 테스트: 성공\n' + verification)
          doc_path.write_text(doc, encoding='utf-8')
          PY

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall aimaos tests

      - name: Run tests
        run: python -m pytest tests -q

      - name: Commit verified changes
        run: |
          git config user.name "campaignpulse-hardening-bot"
          git config user.email "campaignpulse-hardening-bot@users.noreply.github.com"
          git add tests/test_naver_searchad_poc.py docs/CONTINUOUS_HARDENING_STATUS_20260619.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Test Naver API HTTP retry behavior"
            git push origin HEAD:main
          fi
