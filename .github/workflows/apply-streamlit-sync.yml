name: Apply verified Streamlit sync

on:
  push:
    branches: [main]
    paths:
      - .github/patches/streamlit_app_sync.patch
      - .github/workflows/apply-streamlit-sync.yml

permissions:
  contents: write

concurrency:
  group: apply-streamlit-sync
  cancel-in-progress: false

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify and apply the reviewed patch
        run: |
          git apply --check .github/patches/streamlit_app_sync.patch
          git apply .github/patches/streamlit_app_sync.patch

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall aimaos tests

      - name: Run deployment readiness tests
        run: python -m pytest tests -q

      - name: Commit verified app sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aimaos/app/streamlit_app.py
          git commit -m "Sync Streamlit demo mode and readability fixes"
          git push
