name: Apply invalid finished_at collection test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/patches/invalid-finished-at-test.trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply invalid finished_at regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path('tests/test_marketplace_collection.py')
          text = test_path.read_text(encoding='utf-8')
          if 'test_collection_status_falls_back_to_started_at_when_finished_at_is_invalid' not in text:
              new_test = '\n'.join([
                  'def test_collection_status_falls_back_to_started_at_when_finished_at_is_invalid(tmp_path):',
                  '    db_path = tmp_path / "collection_log.sqlite3"',
                  '    append_collection_log(',
                  '        CollectionLogRecord(',
                  '            collection_id="invalid-finished-at",',
                  '            advertiser_id="sample",',
                  '            media="auction",',
                  '            started_at="2026-06-18T11:00:00+09:00",',
                  '            finished_at="not-a-date",',
                  '            status="failed",',
                  '            rows_collected=0,',
                  '            file_count=0,',
                  '            storage_used_mb=0,',
                  '            error_code="DOWNLOAD_FILE_NOT_FOUND",',
                  '            error_message="리포트 파일이 감지되지 않았습니다.",',
                  '        ),',
                  '        db_path,',
                  '    )',
                  '',
                  '    auction = collection_status_by_media(',
                  '        db_path,',
                  '        now=datetime(2026, 6, 19, 0, 0, 0),',
                  '    )["auction"]',
                  '',
                  '    assert auction["latest_status"] == "failed"',
                  '    assert auction["latest_finished_at"] == datetime(2026, 6, 18, 11, 0, 0)',
                  '    assert auction["last_failure_at"] == datetime(2026, 6, 18, 11, 0, 0)',
                  '',
                  '',
              ])
              marker = '    assert gmarket["last_success_at"] == datetime(2026, 6, 18, 9, 5, 0)\n\n\ndef test_collection_status_success_rate_uses_recent_window_only'
              text = text.replace(
                  marker,
                  '    assert gmarket["last_success_at"] == datetime(2026, 6, 18, 9, 5, 0)\n\n\n' + new_test + 'def test_collection_status_success_rate_uses_recent_window_only',
              )
          test_path.write_text(text, encoding='utf-8')

          doc_path = Path('docs/CONTINUOUS_HARDENING_STATUS_20260619.md')
          doc = doc_path.read_text(encoding='utf-8')
          doc = doc.replace('기록일: 2026-06-20', '기록일: 2026-07-22')
          for previous in ['- pytest: `365 passed`', '- pytest: `364 passed`', '- pytest: `363 passed`', '- pytest: `362 passed`', '- pytest: `361 passed`', '- pytest: `360 passed`']:
              doc = doc.replace(previous, '- pytest: `366 passed`')
          detail = '  - `finished_at` 값이 비정상이어도 `started_at`으로 수집 상태 시각을 보존하는지 회귀 테스트로 고정한다.\n'
          if detail not in doc:
              doc = doc.replace('  - 수집 로그에 UTC/타임존 포함 시각이 들어와도 Data Status Center 기준 시각이 한국 시간으로 정규화되는지 회귀 테스트로 고정한다.\n', '  - 수집 로그에 UTC/타임존 포함 시각이 들어와도 Data Status Center 기준 시각이 한국 시간으로 정규화되는지 회귀 테스트로 고정한다.\n' + detail)
          verification = '- 수집 로그 비정상 완료 시각 fallback 회귀 테스트: 성공\n'
          if verification not in doc:
              doc = doc.replace('- 수집 로그 타임존 정규화 회귀 테스트: 성공\n', '- 수집 로그 타임존 정규화 회귀 테스트: 성공\n' + verification)
          doc_path.write_text(doc, encoding='utf-8')
          PY

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall aimaos tests

      - name: Run tests
        run: python -m pytest tests -q

      - name: Commit verified changes
        run: |
          git config user.name "campaignpulse-hardening-bot"
          git config user.email "campaignpulse-hardening-bot@users.noreply.github.com"
          git add tests/test_marketplace_collection.py docs/CONTINUOUS_HARDENING_STATUS_20260619.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Test collection log invalid finished_at fallback"
            git push origin HEAD:main
          fi
