name: Apply marketplace collection logging

on:
  push:
    paths:
      - .github/patches/marketplace-logging.zip.b64
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and apply patch
        shell: bash
        run: |
          base64 --decode .github/patches/marketplace-logging.zip.b64 > /tmp/marketplace-logging.zip
          unzip -p /tmp/marketplace-logging.zip > /tmp/marketplace-logging.patch
          git apply --check /tmp/marketplace-logging.patch
          git apply /tmp/marketplace-logging.patch
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall aimaos tests
      - run: python -m pytest tests -q
      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "CampaignPulse CI"
          git config user.email "actions@users.noreply.github.com"
          git add aimaos/storage/collection_log.py aimaos/collectors/marketplace/gmarket_computer_use_download_poc.py aimaos/collectors/marketplace/marketplace_collection_poc.py tests/test_marketplace_collection.py docs/COLLECTION_LOG_SCHEMA.md docs/GMARKET_AUCTION_DOWNLOAD_POC_RESULT.md
          git commit -m "Normalize marketplace collection logging"
          git push origin HEAD:main
