name: Apply Naver future date guard

on:
  push:
    paths:
      - .github/patches/naver-future-date-guard.trigger

permissions:
  contents: write

jobs:
  update-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply future date guard
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          code_path = Path("aimaos/collectors/naver_searchad_poc.py")
          code = code_path.read_text(encoding="utf-8")
          marker = (
              '    if start and end and start > end:\n'
              '        start, end = end, start\n'
              '        warnings.append("시작일이 종료일보다 늦어 두 날짜를 바꿔 조회합니다.")\n'
          )
          addition = marker + (
              '    if end and end > default_end:\n'
              '        end = default_end\n'
              '        warnings.append("종료일이 오늘 이후여서 조회 가능한 전일로 조정했습니다.")\n'
              '    if start and end and start > end:\n'
              '        start = end\n'
              '        warnings.append("조회 범위가 모두 미래여서 전일 하루로 조정했습니다.")\n'
          )
          if "조회 범위가 모두 미래여서 전일 하루로 조정했습니다." not in code:
              if marker not in code:
                  raise SystemExit("date range marker missing")
              code = code.replace(marker, addition, 1)
          code_path.write_text(code, encoding="utf-8")

          test_path = Path("tests/test_naver_searchad_poc.py")
          tests = test_path.read_text(encoding="utf-8")
          test_marker = "\n\ndef test_stats_attempt_uses_repeated_ids_and_json_fields():\n"
          new_tests = '''

          def test_future_date_range_is_clamped_to_previous_day(monkeypatch):
              monkeypatch.setenv("AIMAOS_POC_START_DATE", "2026-06-10")
              monkeypatch.setenv("AIMAOS_POC_END_DATE", "2026-06-25")

              result = load_poc_date_range_from_env(today=date(2026, 6, 20))

              assert result.start == date(2026, 6, 10)
              assert result.end == date(2026, 6, 19)
              assert any("조회 가능한 전일" in warning for warning in result.warnings)


          def test_fully_future_date_range_becomes_previous_day(monkeypatch):
              monkeypatch.setenv("AIMAOS_POC_START_DATE", "2026-06-25")
              monkeypatch.setenv("AIMAOS_POC_END_DATE", "2026-06-30")

              result = load_poc_date_range_from_env(today=date(2026, 6, 20))

              assert result.start == date(2026, 6, 19)
              assert result.end == date(2026, 6, 19)
              assert any("전일 하루" in warning for warning in result.warnings)
          '''
          new_tests = "\n".join(line[10:] if line.startswith("          ") else line for line in new_tests.splitlines())
          if "test_future_date_range_is_clamped_to_previous_day" not in tests:
              if test_marker not in tests:
                  raise SystemExit("test insertion marker missing")
              tests = tests.replace(test_marker, new_tests + test_marker, 1)
          test_path.write_text(tests, encoding="utf-8")
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall aimaos tests
      - run: python -m pytest tests -q
      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "CampaignPulse CI"
          git config user.email "actions@users.noreply.github.com"
          git add aimaos/collectors/naver_searchad_poc.py tests/test_naver_searchad_poc.py
          git commit -m "Clamp Naver stats ranges to available dates"
          git push origin HEAD:main
