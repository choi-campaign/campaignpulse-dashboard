name: Apply demo status UI clarity

on:
  push:
    paths:
      - .github/patches/demo-status-ui.trigger

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply UI clarity updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path_text: str, old: str, new: str) -> None:
              path = Path(path_text)
              text = path.read_text(encoding="utf-8")
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f"expected source text missing: {path_text}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "aimaos/app/streamlit_app.py",
              "def data_status_badge(status: str) -> str:\n",
              "def channel_needs_data_attention(status: object) -> bool:\n    return str(status) in {\"주의\", \"오래됨\", \"연결 안됨\"}\n\n\ndef data_status_badge(status: str) -> str:\n",
          )
          replace_once(
              "aimaos/app/streamlit_app.py",
              "    non_fresh_channels = sum(1 for channel in status[\"channels\"] if channel[\"status\"] != \"최신\")",
              "    non_fresh_channels = sum(\n        1 for channel in status[\"channels\"] if channel_needs_data_attention(channel[\"status\"])\n    )",
          )
          replacements = [
              ("(\"마지막 수집\", format_status_time(status[\"last_collection_at\"]), \"최근 데이터가 들어온 시각\")", "(\"마지막 수집 시도\", format_status_time(status[\"last_collection_at\"]), \"최근 수집 작업이 끝난 시각\")"),
              ("먼저 데이터 연결 상태와 마지막 수집 시각을 확인해 주세요.", "먼저 데이터 연결 상태와 마지막 수집 시도, 마지막 성공 시각을 확인해 주세요."),
              ("<div class=\"aima-data-status-title\">마지막 데이터 수집 시각</div>", "<div class=\"aima-data-status-title\">마지막 수집 시도 시각</div>"),
              ("f'<div class=\"aima-data-status-value\">{escape(format_status_time(status[\"last_collection_at\"]))}</div>'\n            \"</div>\",", "f'<div class=\"aima-data-status-value\">{escape(format_status_time(status[\"last_collection_at\"]))}</div>'\n            '<div class=\"aima-summary-note\">성공과 실패를 포함한 최근 수집 작업 종료 시각</div>'\n            \"</div>\","),
              ("<div>매체</div><div>연결 상태</div><div>마지막 수집</div><div>마지막 확인</div><div>상태</div>", "<div>매체</div><div>연결 상태</div><div>마지막 성공 수집</div><div>마지막 확인</div><div>상태</div>"),
              ("        \"종합 대시보드\": sum(1 for channel in collect_data_status_snapshot()[\"channels\"] if channel[\"status\"] != \"최신\"),", "        \"종합 대시보드\": sum(\n            1\n            for channel in collect_data_status_snapshot()[\"channels\"]\n            if channel_needs_data_attention(channel[\"status\"])\n        ),"),
          ]
          for old, new in replacements:
              replace_once("aimaos/app/streamlit_app.py", old, new)

          test_path = Path("tests/test_demo_deploy_readiness.py")
          test_text = test_path.read_text(encoding="utf-8")
          test_name = "def test_data_status_ui_distinguishes_demo_and_collection_attempts():"
          if test_name not in test_text:
              marker = "def test_public_docs_do_not_expose_poc_identifiers_or_local_user_paths():"
              test_lines = [
                  test_name,
                  "    source = STREAMLIT_APP.read_text(encoding=\"utf-8\")",
                  "",
                  "    assert 'return str(status) in {\"주의\", \"오래됨\", \"연결 안됨\"}' in source",
                  "    assert \"마지막 수집 시도\" in source",
                  "    assert \"성공과 실패를 포함한 최근 수집 작업 종료 시각\" in source",
                  "    assert \"마지막 성공 수집\" in source",
                  "",
                  "",
              ]
              if marker not in test_text:
                  raise SystemExit("test insertion marker missing")
              test_path.write_text(test_text.replace(marker, "\n".join(test_lines) + marker, 1), encoding="utf-8")

          replace_once(
              "docs/DATA_STATUS_CENTER_REFACTOR.md",
              "3. 파일 시각과 수집 로그 종료 시각 중 더 최근 값을 전체 마지막 수집 시각으로 사용한다.",
              "3. 파일 시각과 수집 로그 종료 시각 중 더 최근 값을 전체 마지막 수집 시도 시각으로 사용한다.",
          )
          doc_path = Path("docs/DATA_STATUS_CENTER_REFACTOR.md")
          doc_text = doc_path.read_text(encoding="utf-8")
          sentence = "데모 상태는 기능 시연 중임을 뜻하며 수집 장애가 아니다. 따라서 `데이터 확인 필요` 개수에는 `주의`, `오래됨`, `연결 안됨`만 포함하고 `데모`는 제외한다."
          if sentence not in doc_text:
              marker = "7. 실제 업로드 데이터가 있으면 데모보다 업로드 결과를 우선한다.\n"
              if marker not in doc_text:
                  raise SystemExit("documentation insertion marker missing")
              doc_path.write_text(doc_text.replace(marker, marker + "\n" + sentence + "\n", 1), encoding="utf-8")
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall aimaos tests
      - run: python -m pytest tests -q
      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "CampaignPulse CI"
          git config user.email "actions@users.noreply.github.com"
          git add aimaos/app/streamlit_app.py tests/test_demo_deploy_readiness.py docs/DATA_STATUS_CENTER_REFACTOR.md
          git commit -m "Clarify demo data status indicators"
          git push origin HEAD:main
