name: Apply collection success window test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/patches/collection-success-window-test.trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply collection success window regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path('tests/test_marketplace_collection.py')
          text = test_path.read_text(encoding='utf-8')
          if 'test_collection_status_success_rate_uses_recent_window_only' not in text:
              new_test = '\n'.join([
                  'def test_collection_status_success_rate_uses_recent_window_only(tmp_path):',
                  '    db_path = tmp_path / "collection_log.sqlite3"',
                  '    append_collection_log(',
                  '        CollectionLogRecord(',
                  '            collection_id="old-success",',
                  '            advertiser_id="sample",',
                  '            media="gmarket",',
                  '            started_at="2026-05-01 09:00:00",',
                  '            finished_at="2026-05-01 09:01:00",',
                  '            status="success",',
                  '            rows_collected=30,',
                  '            file_count=1,',
                  '            storage_used_mb=0.2,',
                  '            error_code="",',
                  '            error_message="",',
                  '        ),',
                  '        db_path,',
                  '    )',
                  '    append_collection_log(',
                  '        CollectionLogRecord(',
                  '            collection_id="recent-failure",',
                  '            advertiser_id="sample",',
                  '            media="gmarket",',
                  '            started_at="2026-06-18 09:00:00",',
                  '            finished_at="2026-06-18 09:01:00",',
                  '            status="failed",',
                  '            rows_collected=0,',
                  '            file_count=0,',
                  '            storage_used_mb=0,',
                  '            error_code="DOWNLOAD_FILE_NOT_FOUND",',
                  '            error_message="리포트 파일이 감지되지 않았습니다.",',
                  '        ),',
                  '        db_path,',
                  '    )',
                  '',
                  '    gmarket = collection_status_by_media(',
                  '        db_path,',
                  '        now=datetime(2026, 6, 19, 0, 0, 0),',
                  '    )["gmarket"]',
                  '',
                  '    assert gmarket["latest_status"] == "failed"',
                  '    assert gmarket["last_success_at"] == datetime(2026, 5, 1, 9, 1, 0)',
                  '    assert gmarket["success_count_30d"] == 0',
                  '    assert gmarket["total_count_30d"] == 1',
                  '    assert gmarket["success_rate_30d"] == 0',
                  '',
                  '',
              ])
              marker = '    assert gmarket["last_success_at"] == datetime(2026, 6, 18, 9, 5, 0)\n\n\ndef test_manual_marketplace_attempt_without_download_records_failure'
              text = text.replace(
                  marker,
                  '    assert gmarket["last_success_at"] == datetime(2026, 6, 18, 9, 5, 0)\n\n\n' + new_test + 'def test_manual_marketplace_attempt_without_download_records_failure',
              )
          test_path.write_text(text, encoding='utf-8')

          doc_path = Path('docs/CONTINUOUS_HARDENING_STATUS_20260619.md')
          doc = doc_path.read_text(encoding='utf-8')
          doc = doc.replace('기록일: 2026-06-20', '기록일: 2026-07-22')
          doc = doc.replace('- pytest: `361 passed`', '- pytest: `362 passed`')
          doc = doc.replace('- pytest: `360 passed`', '- pytest: `362 passed`')
          detail = '  - 30일 이전 성공 기록은 마지막 성공 시각으로 보존하되 최근 30일 성공률 계산에는 포함하지 않는지 회귀 테스트로 고정한다.\n'
          if detail not in doc:
              doc = doc.replace('  - 수집 로그에 UTC/타임존 포함 시각이 들어와도 Data Status Center 기준 시각이 한국 시간으로 정규화되는지 회귀 테스트로 고정한다.\n', '  - 수집 로그에 UTC/타임존 포함 시각이 들어와도 Data Status Center 기준 시각이 한국 시간으로 정규화되는지 회귀 테스트로 고정한다.\n' + detail)
          verification = '- 수집 로그 최근 30일 성공률 회귀 테스트: 성공\n'
          if verification not in doc:
              doc = doc.replace('- 수집 로그 타임존 정규화 회귀 테스트: 성공\n', '- 수집 로그 타임존 정규화 회귀 테스트: 성공\n' + verification)
          doc_path.write_text(doc, encoding='utf-8')
          PY

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall aimaos tests

      - name: Run tests
        run: python -m pytest tests -q

      - name: Commit verified changes
        run: |
          git config user.name "campaignpulse-hardening-bot"
          git config user.email "campaignpulse-hardening-bot@users.noreply.github.com"
          git add tests/test_marketplace_collection.py docs/CONTINUOUS_HARDENING_STATUS_20260619.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Test collection success rate window"
            git push origin HEAD:main
          fi
