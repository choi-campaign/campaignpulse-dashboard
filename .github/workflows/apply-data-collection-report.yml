name: Apply dynamic collection POC report

on:
  push:
    branches: [main]
    paths:
      - ".github/patches/data-collection-report-dynamic.patch"
      - ".github/workflows/apply-data-collection-report.yml"

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply patch
        run: |
          git apply --check .github/patches/data-collection-report-dynamic.patch
          git apply .github/patches/data-collection-report-dynamic.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify sources and tests
        run: |
          python -m compileall aimaos tests
          python -m pytest tests -q

      - name: Commit verified change
        run: |
          git config user.name "campaignpulse-ci"
          git config user.email "campaignpulse-ci@users.noreply.github.com"
          git add aimaos/collectors/data_collection_poc.py
          git commit -m "Generate collection POC report from actual results"
          git push origin HEAD:main
