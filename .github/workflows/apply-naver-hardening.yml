name: Apply Naver collection hardening

on:
  push:
    paths:
      - .github/patches/naver-hardening.zip.b64
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and apply patch
        shell: bash
        run: |
          base64 --decode .github/patches/naver-hardening.zip.b64 > /tmp/naver-hardening.zip
          unzip -p /tmp/naver-hardening.zip > /tmp/naver-hardening.patch
          git apply --check /tmp/naver-hardening.patch
          git apply /tmp/naver-hardening.patch
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall aimaos tests
      - run: python -m pytest tests -q
      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "CampaignPulse CI"
          git config user.email "actions@users.noreply.github.com"
          git add .env.example aimaos/collectors/naver_searchad_poc.py tests/test_naver_searchad_poc.py docs/COLLECTION_LOG_SCHEMA.md docs/DATA_COLLECTION_POC_REPORT.md
          git commit -m "Harden Naver collection retries and logging"
          git push origin HEAD:main
