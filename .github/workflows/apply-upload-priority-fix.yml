name: Apply verified upload priority fix

on:
  push:
    branches: [main]
    paths:
      - .github/patches/upload-priority-notice.patch
      - .github/workflows/apply-upload-priority-fix.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply reviewed UI-state patch
        run: |
          git apply --check .github/patches/upload-priority-notice.patch
          git apply .github/patches/upload-priority-notice.patch
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile
        run: python -m compileall aimaos tests
      - name: Test
        run: python -m pytest tests -q
      - name: Commit verified fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aimaos/app/streamlit_app.py
          git commit -m "Hide demo-current notice after uploaded analysis"
          git push
