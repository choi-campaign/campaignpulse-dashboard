name: Apply Naver stats failure log test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/patches/naver-stats-failure-log-test.trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply Naver stats failure log regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path('tests/test_naver_searchad_poc.py')
          text = test_path.read_text(encoding='utf-8')
          if 'test_naver_collection_log_records_failed_when_stats_step_fails' not in text:
              new_test = '\n'.join([
                  'def test_naver_collection_log_records_failed_when_stats_step_fails(tmp_path):',
                  '    db_path = tmp_path / "collection_log.sqlite3"',
                  '    context = {',
                  '        "started_at": "2026-06-19 09:00:00",',
                  '        "response_data_rows": None,',
                  '        "standard_csv_rows": None,',
                  '        "zero_guard_applied": False,',
                  '        "standard_csv_path": None,',
                  '        "report_paths": {},',
                  '    }',
                  '    results = [',
                  '        PocStepResult("기간 성과 조회", "실패", "stats API 조회 실패"),',
                  '    ]',
                  '',
                  '    step = write_naver_collection_log(credentials(), context, results, db_path)',
                  '',
                  '    assert step.status == "성공"',
                  '    rows = recent_collection_logs(10, db_path)',
                  '    assert rows[0]["status"] == "failed"',
                  '    assert rows[0]["error_code"] == "NAVER_STATS_COLLECTION_FAILED"',
                  '    assert rows[0]["error_message"] == "stats API 조회 실패"',
                  '    assert rows[0]["rows_collected"] == 0',
                  '    assert rows[0]["file_count"] == 0',
                  '    assert "demo-customer" not in rows[0]["advertiser_id"]',
                  '    status = collection_status_by_media(db_path)["naver_searchad"]',
                  '    assert status["latest_status"] == "failed"',
                  '    assert status["last_failure_at"] is not None',
                  '',
                  '',
              ])
              text = text.rstrip() + '\n\n' + new_test
          test_path.write_text(text, encoding='utf-8')

          doc_path = Path('docs/CONTINUOUS_HARDENING_STATUS_20260619.md')
          doc = doc_path.read_text(encoding='utf-8')
          doc = doc.replace('기록일: 2026-06-20', '기록일: 2026-07-22')
          for previous in ['- pytest: `364 passed`', '- pytest: `363 passed`', '- pytest: `362 passed`', '- pytest: `361 passed`', '- pytest: `360 passed`']:
              doc = doc.replace(previous, '- pytest: `365 passed`')
          detail = '  - 네이버 stats 조회 자체가 실패한 경우 `failed`로 기록되고 광고주 원본 식별자가 로그에 노출되지 않는지 회귀 테스트로 고정한다.\n'
          if detail not in doc:
              doc = doc.replace('  - 네이버 성과 행은 수집됐지만 기존 분석 파이프라인 또는 보고서 단계가 실패한 경우 `partial`로 기록되는지 회귀 테스트로 고정한다.\n', '  - 네이버 성과 행은 수집됐지만 기존 분석 파이프라인 또는 보고서 단계가 실패한 경우 `partial`로 기록되는지 회귀 테스트로 고정한다.\n' + detail)
          verification = '- 네이버 stats 실패 로그 회귀 테스트: 성공\n'
          if verification not in doc:
              doc = doc.replace('- 네이버 파이프라인 부분성공 로그 회귀 테스트: 성공\n', '- 네이버 파이프라인 부분성공 로그 회귀 테스트: 성공\n' + verification)
          doc_path.write_text(doc, encoding='utf-8')
          PY

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall aimaos tests

      - name: Run tests
        run: python -m pytest tests -q

      - name: Commit verified changes
        run: |
          git config user.name "campaignpulse-hardening-bot"
          git config user.email "campaignpulse-hardening-bot@users.noreply.github.com"
          git add tests/test_naver_searchad_poc.py docs/CONTINUOUS_HARDENING_STATUS_20260619.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Test Naver stats failure collection log"
            git push origin HEAD:main
          fi
