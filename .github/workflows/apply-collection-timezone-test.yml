name: Apply collection timezone test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/patches/collection-timezone-test.trigger
      - .github/workflows/apply-collection-timezone-test.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply collection timezone regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path('tests/test_marketplace_collection.py')
          text = test_path.read_text(encoding='utf-8')
          if 'test_collection_status_normalizes_timezone_aware_log_times' not in text:
              new_test = '\n'.join([
                  'def test_collection_status_normalizes_timezone_aware_log_times(tmp_path):',
                  '    db_path = tmp_path / "collection_log.sqlite3"',
                  '    append_collection_log(',
                  '        CollectionLogRecord(',
                  '            collection_id="utc-success",',
                  '            advertiser_id="sample",',
                  '            media="gmarket",',
                  '            started_at="2026-06-18T00:00:00+00:00",',
                  '            finished_at="2026-06-18T00:05:00+00:00",',
                  '            status="success",',
                  '            rows_collected=10,',
                  '            file_count=1,',
                  '            storage_used_mb=0.1,',
                  '            error_code="",',
                  '            error_message="",',
                  '        ),',
                  '        db_path,',
                  '    )',
                  '',
                  '    gmarket = collection_status_by_media(',
                  '        db_path,',
                  '        now=datetime(2026, 6, 19, 0, 0, 0),',
                  '    )["gmarket"]',
                  '',
                  '    assert gmarket["latest_finished_at"] == datetime(2026, 6, 18, 9, 5, 0)',
                  '    assert gmarket["last_success_at"] == datetime(2026, 6, 18, 9, 5, 0)',
                  '',
                  '',
              ])
              marker = '    assert gmarket["success_rate_30d"] == 50\n\n\ndef test_manual_marketplace_attempt_without_download_records_failure'
              text = text.replace(
                  marker,
                  '    assert gmarket["success_rate_30d"] == 50\n\n\n' + new_test + 'def test_manual_marketplace_attempt_without_download_records_failure',
              )
          test_path.write_text(text, encoding='utf-8')

          doc_path = Path('docs/CONTINUOUS_HARDENING_STATUS_20260619.md')
          doc = doc_path.read_text(encoding='utf-8')
          doc = doc.replace('기록일: 2026-06-20', '기록일: 2026-07-22')
          doc = doc.replace('- pytest: `360 passed`', '- pytest: `361 passed`')
          detail = '  - 수집 로그에 UTC/타임존 포함 시각이 들어와도 Data Status Center 기준 시각이 한국 시간으로 정규화되는지 회귀 테스트로 고정한다.\n'
          if detail not in doc:
              doc = doc.replace('- `tests/test_marketplace_collection.py`\n', '- `tests/test_marketplace_collection.py`\n' + detail)
          verification = '- 수집 로그 타임존 정규화 회귀 테스트: 성공\n'
          if verification not in doc:
              doc = doc.replace('- 마켓플레이스 파일 감지 회귀 테스트: 성공\n', '- 마켓플레이스 파일 감지 회귀 테스트: 성공\n' + verification)
          doc_path.write_text(doc, encoding='utf-8')
          PY

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall aimaos tests

      - name: Run tests
        run: python -m pytest tests -q

      - name: Commit verified changes
        run: |
          git config user.name "campaignpulse-hardening-bot"
          git config user.email "campaignpulse-hardening-bot@users.noreply.github.com"
          git add tests/test_marketplace_collection.py docs/CONTINUOUS_HARDENING_STATUS_20260619.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Test collection log timezone status"
            git push origin HEAD:main
          fi
