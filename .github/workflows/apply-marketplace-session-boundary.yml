name: Apply marketplace session boundary

on:
  push:
    branches: [main]
    paths:
      - ".github/patches/marketplace-session-boundary.patch"
      - ".github/workflows/apply-marketplace-session-boundary.yml"

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply patch
        run: |
          git apply --unidiff-zero --check .github/patches/marketplace-session-boundary.patch
          git apply --unidiff-zero .github/patches/marketplace-session-boundary.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify sources and tests
        run: |
          python -m compileall aimaos tests
          python -m pytest tests -q

      - name: Commit verified change
        run: |
          git config user.name "campaignpulse-ci"
          git config user.email "campaignpulse-ci@users.noreply.github.com"
          git add aimaos/collectors/marketplace/marketplace_collection_poc.py
          git commit -m "Bind marketplace downloads to manual session"
          git push origin HEAD:main
